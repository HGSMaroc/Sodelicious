<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>So Delicious Pastry</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --pink:#c8476a; --pink-light:#f0c2cf; --cream:#fdf6f0;
  --dark:#1a1a1a; --gold:#c8a96e; --gray:#6b6b6b;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Lato',sans-serif;background:var(--cream);color:var(--dark);}

nav{background:white;padding:0 40px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 15px rgba(0,0,0,0.08);position:sticky;top:0;z-index:1000;height:80px;}
.logo-wrap img{height:60px;object-fit:contain;}
.nav-links{display:flex;gap:28px;align-items:center;}
.nav-links a{text-decoration:none;color:var(--dark);font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;transition:.2s;}
.nav-links a:hover{color:var(--pink);}
.lang-switcher{display:flex;gap:7px;}
.lang-btn{background:none;border:1.5px solid var(--pink);color:var(--pink);padding:4px 10px;border-radius:20px;font-size:12px;cursor:pointer;font-weight:700;transition:.2s;}
.lang-btn.active,.lang-btn:hover{background:var(--pink);color:white;}
.cart-btn{background:var(--pink);color:white;border:none;padding:10px 22px;border-radius:25px;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:8px;transition:.2s;}
.cart-btn:hover{background:#a83358;}
.cart-count{background:white;color:var(--pink);border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;}

.hero{background:linear-gradient(135deg,#fff0f4 0%,#fdf6f0 50%,#fff8f0 100%);padding:80px 40px;text-align:center;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(200,71,106,0.08) 0%,transparent 60%),radial-gradient(ellipse at 80% 50%,rgba(200,169,110,0.08) 0%,transparent 60%);}
.hero-badge{display:inline-block;background:var(--pink);color:white;padding:6px 20px;border-radius:20px;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:20px;}
.hero h1{font-family:'Playfair Display',serif;font-size:clamp(2.5rem,6vw,4.5rem);color:var(--dark);line-height:1.1;margin-bottom:15px;position:relative;}
.hero h1 span{color:var(--pink);font-style:italic;}
.hero p{font-size:16px;color:var(--gray);max-width:500px;margin:0 auto 25px;line-height:1.8;position:relative;}
.delivery-badge{display:inline-flex;align-items:center;gap:8px;background:white;border:1.5px solid var(--gold);padding:10px 25px;border-radius:30px;font-size:13px;font-weight:700;color:var(--gold);position:relative;}

.section{padding:60px 40px;max-width:1200px;margin:0 auto;}
.section-title{font-family:'Playfair Display',serif;font-size:2rem;color:var(--dark);margin-bottom:8px;}
.section-title span{color:var(--pink);}
.divider{width:60px;height:3px;background:var(--pink);border-radius:2px;margin:12px 0 35px;}
.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:28px;}

.card{background:white;border-radius:20px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,0.07);transition:transform .3s,box-shadow .3s;position:relative;}
.card:hover{transform:translateY(-6px);box-shadow:0 12px 35px rgba(200,71,106,0.15);}
.card-img-wrap{overflow:hidden;position:relative;}
.card-img{width:100%;height:260px;object-fit:cover;display:block;transition:transform .4s;}
.card:hover .card-img{transform:scale(1.04);}
.card-body{padding:18px 20px 20px;}
.card-name{font-family:'Playfair Display',serif;font-size:1.15rem;color:var(--dark);font-weight:700;margin-bottom:3px;}
.card-name-ar{font-family:'Amiri',serif;font-size:0.95rem;color:var(--gray);margin-bottom:8px;}
.card-desc{font-size:13px;color:var(--gray);line-height:1.6;margin-bottom:14px;}
.card-footer{display:flex;align-items:center;justify-content:space-between;}
.price{font-size:1.15rem;font-weight:900;color:var(--pink);}
.price-sub{font-size:11px;font-weight:400;color:var(--gray);}
.add-btn{background:var(--pink);color:white;border:none;padding:9px 18px;border-radius:20px;font-size:13px;font-weight:700;cursor:pointer;transition:.2s;}
.add-btn:hover{background:#a83358;transform:scale(1.05);}
.tag{position:absolute;top:12px;left:12px;background:var(--gold);color:white;font-size:11px;font-weight:700;padding:4px 12px;border-radius:12px;letter-spacing:1px;text-transform:uppercase;z-index:2;}
.tag-pink{background:var(--pink);}

.group-selector{margin:10px 0 14px;}
.group-label{font-size:11px;font-weight:700;color:var(--gray);margin-bottom:7px;text-transform:uppercase;letter-spacing:1px;}
.group-options{display:flex;flex-wrap:wrap;gap:6px;}
.group-opt{border:1.5px solid #e0e0e0;background:white;padding:5px 11px;border-radius:14px;font-size:12px;cursor:pointer;transition:.2s;font-weight:600;color:var(--dark);}
.group-opt:hover,.group-opt.selected{border-color:var(--pink);background:var(--pink);color:white;}

/* CART SIDEBAR */
.cart-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:2000;display:none;}
.cart-overlay.open{display:block;}
.cart-sidebar{position:fixed;right:0;top:0;bottom:0;width:400px;max-width:96vw;background:white;z-index:2001;box-shadow:-5px 0 30px rgba(0,0,0,0.15);transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;}
.cart-sidebar.open{transform:translateX(0);}
.cart-header{padding:22px 25px;border-bottom:1px solid #f0f0f0;display:flex;justify-content:space-between;align-items:center;}
.cart-header h2{font-family:'Playfair Display',serif;font-size:1.3rem;}
.close-cart{background:none;border:none;font-size:22px;cursor:pointer;color:var(--gray);line-height:1;}
.close-cart:hover{color:var(--pink);}
.cart-items{flex:1;overflow-y:auto;padding:15px 20px;}
.cart-empty{text-align:center;padding:60px 20px;color:var(--gray);}
.cart-empty .empty-icon{font-size:50px;margin-bottom:15px;}

.cart-item{display:flex;gap:12px;padding:14px 0;border-bottom:1px solid #f5f5f5;align-items:center;}
.cart-item-thumb{width:72px;height:72px;object-fit:cover;border-radius:14px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,0.1);}
.cart-item-info{flex:1;min-width:0;}
.cart-item-name{font-weight:700;font-size:13px;margin-bottom:2px;line-height:1.3;}
.cart-item-price{font-weight:900;color:var(--pink);font-size:14px;margin-top:4px;}
.cart-item-remove{background:none;border:none;color:#ccc;cursor:pointer;font-size:18px;padding:4px;flex-shrink:0;}
.cart-item-remove:hover{color:var(--pink);}
.cart-qty{display:flex;align-items:center;gap:8px;margin-top:6px;}
.qty-btn{width:24px;height:24px;border-radius:50%;border:1.5px solid var(--pink);background:white;color:var(--pink);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;transition:.2s;}
.qty-btn:hover{background:var(--pink);color:white;}
.qty-num{font-size:13px;font-weight:700;min-width:20px;text-align:center;}

.cart-footer{padding:18px 22px;border-top:1px solid #f0f0f0;}
.cart-total{display:flex;justify-content:space-between;font-size:1.1rem;font-weight:900;margin-bottom:6px;}
.cart-shipping{font-size:13px;color:var(--gold);font-weight:700;text-align:center;margin-bottom:14px;}
.whatsapp-btn{display:flex;align-items:center;justify-content:center;gap:10px;background:#25D366;color:white;border:none;width:100%;padding:14px;border-radius:14px;font-size:15px;font-weight:800;cursor:pointer;transition:.2s;text-decoration:none;}
.whatsapp-btn:hover{background:#1da851;transform:scale(1.02);}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:3000;display:none;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.open{display:flex;}
.modal{background:white;border-radius:24px;padding:35px;max-width:480px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.2);}
.modal h2{font-family:'Playfair Display',serif;font-size:1.6rem;margin-bottom:6px;}
.modal-sub{color:var(--gray);font-size:13px;margin-bottom:22px;}
.form-group{margin-bottom:15px;}
.form-group label{display:block;font-size:13px;font-weight:700;margin-bottom:5px;}
.form-group input,.form-group textarea{width:100%;padding:11px 15px;border:1.5px solid #e0e0e0;border-radius:12px;font-size:14px;font-family:'Lato',sans-serif;outline:none;transition:.2s;background:#fafafa;}
.form-group input:focus,.form-group textarea:focus{border-color:var(--pink);background:white;}
.form-group textarea{height:85px;resize:vertical;}
.form-btns{display:flex;gap:12px;margin-top:18px;}
.cancel-btn{flex:1;background:#f0f0f0;border:none;padding:13px;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;}
.confirm-btn{flex:2;background:var(--pink);color:white;border:none;padding:13px;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;transition:.2s;}
.confirm-btn:hover{background:#a83358;}

footer{background:var(--dark);color:white;padding:50px 40px 30px;text-align:center;}
footer img{height:55px;margin-bottom:18px;filter:brightness(0) invert(1);opacity:.85;}
.footer-tagline{font-family:'Playfair Display',serif;font-style:italic;color:var(--pink-light);font-size:1rem;margin-bottom:14px;}
.footer-info{font-size:13px;color:#aaa;line-height:2.2;}
.footer-info a{color:var(--gold);text-decoration:none;}
.footer-copy{margin-top:28px;font-size:12px;color:#555;border-top:1px solid #333;padding-top:18px;}

.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--dark);color:white;padding:14px 28px;border-radius:30px;font-size:14px;font-weight:700;z-index:9999;transition:transform .4s;box-shadow:0 5px 20px rgba(0,0,0,0.2);white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}

.white-section{background:white;padding:20px 0;}

body.ar{direction:rtl;}
body.ar .cart-sidebar{right:auto;left:0;box-shadow:5px 0 30px rgba(0,0,0,0.15);transform:translateX(-100%);}
body.ar .cart-sidebar.open{transform:translateX(0);}
body.ar .tag{left:auto;right:12px;}

@media(max-width:768px){
  nav{padding:0 16px;}
  .nav-links{display:none;}
  .hero{padding:55px 20px;}
  .section{padding:40px 20px;}
  .products-grid{grid-template-columns:1fr 1fr;gap:16px;}
  .card-img{height:180px;}
}
@media(max-width:480px){
  .products-grid{grid-template-columns:1fr;}
}
</style>
</head>
